openapi: 3.1.0
info:
  title: ownEvo Kernel API
  version: 0.1.0
  description: |
    REST + Server-Sent Events contract between the Python kernel (`apps/kernel/`)
    and the TS web app (`apps/web/`). Locked 2026-05-03 by eng review (D2).

    Generated artifacts:
      - Python Pydantic models: `apps/kernel/src/ownevo_kernel/api/models.py`
      - TypeScript client: `apps/web/lib/api/client.ts` (via openapi-typescript)

    Auth model (MVP, single-tenant per D4): no auth in development;
    dev-token middleware in staging. Production auth is Phase 2.

servers:
  - url: http://localhost:8080
    description: Local dev

tags:
  - name: workflows
    description: Workflow lifecycle (NL-gen creates them)
  - name: proposals
    description: Approval queue
  - name: gate
    description: Gate runs and live status
  - name: lift
    description: Lift charts and metrics
  - name: audit
    description: Append-only audit log
  - name: skills
    description: Skill registry
  - name: clusters
    description: Failure clusters
  - name: traces
    description: Agent event streams

paths:
  # ---------- workflows ----------
  /api/workflows:
    post:
      tags: [workflows]
      summary: Create workflow from natural-language description (NL-gen)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowRequest'
      responses:
        '201':
          description: Created. Server begins NL-gen + meta-eval; subscribe to /api/workflows/{id}/stream for progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
    get:
      tags: [workflows]
      summary: List workflows with summary metrics (W7 slice 2 — Health page)
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowListResponse'

  /api/workflows/{id}:
    get:
      tags: [workflows]
      summary: Workflow detail with full NL-gen spec (W7 slice 11 / 7.1.12)
      description: |
        Drives the Agent-anatomy pane on the workflow Overview page.
        Returns the raw NL-gen `spec` JSONB (frozen schema at
        `apps/kernel/src/ownevo_kernel/nl_gen/spec.py:WorkflowSpec`)
        so the web app can read `spec.tools[*]`, `spec.reviewer`,
        `spec.environment`, etc. without an additional fetch.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowAnatomyResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/workflows/{id}/iterations:
    get:
      tags: [workflows]
      summary: Chronological iterations for the LiftChart (W7 slice 2)
      description: |
        Returns one point per non-running iteration, sorted by iteration_index
        ASC. The web UI plots `iteration_index × val_score` and overlays
        an annotated dot wherever `has_approved_proposal=true`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IterationListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/workflows/{id}/failure_clusters:
    get:
      tags: [workflows]
      summary: Failure clusters for a workflow (W7 slice 3 — Failures view)
      description: |
        Sorted by severity (high → low) then `cluster_size DESC`. The
        `centroid` column is intentionally excluded from the response —
        384 floats per row aren't useful to the UI.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureClusterListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/workflows/{id}/stream:
    get:
      tags: [workflows]
      summary: SSE — workflow generation progress (sim, eval cases, metric, meta-eval)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: text/event-stream of SSEEvent (see components.x-sse-events)
          content:
            text/event-stream: {}

  # ---------- proposals (approval queue) ----------
  /api/proposals:
    get:
      tags: [proposals]
      summary: List proposals (filterable by state)
      parameters:
        - name: state
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ProposalState'
        - name: workflow_id
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalListResponse'

  /api/proposals/{id}:
    get:
      tags: [proposals]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposalDetail'

  /api/proposals/{id}/approve:
    post:
      tags: [proposals]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                comment: { type: string }
      responses:
        '200':
          description: Approval recorded. Audit entry appended. Deploy job enqueued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Proposal'

  /api/proposals/{id}/reject:
    post:
      tags: [proposals]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment:
                  type: string
                  description: Required on reject; becomes an eval_case row with provenance=rejected-feedback.
      responses:
        '200':
          description: Rejection recorded. Audit entry appended. Comment converted to eval case.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Proposal'

  # ---------- gate ----------
  /api/gate/runs/{iteration_id}/stream:
    get:
      tags: [gate]
      summary: SSE — live gate-run progress for one iteration
      parameters:
        - name: iteration_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: text/event-stream of GateProgressEvent
          content:
            text/event-stream: {}

  # ---------- lift ----------
  /api/lift/series:
    get:
      tags: [lift]
      summary: Lift chart series (one workflow)
      parameters:
        - name: workflow_id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LiftPoint'

  # ---------- audit ----------
  /api/audit:
    get:
      tags: [audit]
      summary: Audit trail (W7 slice 4 — workspace-scoped, newest first)
      description: |
        Returns up to `limit` audit entries ordered by `seq DESC`. The
        `total` field reports the unfiltered DB count so the UI can
        render "showing N of total". `kind` filters to a single
        audit_kind enum value.
      parameters:
        - name: since_seq
          in: query
          description: Return only entries with seq > since_seq (keyset pagination, ASC source).
          schema: { type: integer, minimum: 0 }
        - name: kind
          in: query
          schema: { $ref: '#/components/schemas/AuditKind' }
        - name: limit
          in: query
          schema: { type: integer, default: 200, minimum: 1, maximum: 500 }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditListResponse'

  /api/audit/verify:
    post:
      tags: [audit]
      summary: Verify the append-only chain (W7 slice 4)
      description: |
        Structural integrity check: every seq from min..max present
        (no gaps), no duplicates, canonical-JSON export round-trips.
        D2 (append-only, no crypto). TODO-3 extends with parent_hash /
        entry_hash verification when first regulated buyer evaluates.
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditVerifyResponse'

  # ---------- skills ----------
  /api/skills:
    get:
      tags: [skills]
      parameters:
        - name: workflow_id
          in: query
          schema: { type: string }
        - name: capability
          in: query
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Skill'

  # W7 slices 9 + 10 (7.1.10 + 7.1.11) — skill detail + per-workflow list
  /api/workflows/{workflow_id}/skills:
    get:
      tags: [skills]
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillListResponse'

  /api/skills/{skill_id}:
    get:
      tags: [skills]
      parameters:
        - name: skill_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDetailResponse'

  /api/skills/{id}/versions:
    get:
      tags: [skills]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SkillVersion'

  /api/skills/{id}/revert:
    post:
      tags: [skills]
      summary: Revert to a prior version (W7 demo rollback runbook)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_version_seq, reason]
              properties:
                to_version_seq: { type: integer }
                reason: { type: string }
      responses:
        '200':
          description: Reverted. Audit entry kind=proposal-rolled-back appended.

  # ---------- clusters ----------
  /api/clusters:
    get:
      tags: [clusters]
      parameters:
        - name: workflow_id
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FailureCluster'

  # ---------- traces (W7 slice 8 / 7.1.9) ----------
  /api/workflows/{workflow_id}/traces:
    get:
      tags: [traces]
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceListResponse'

  /api/traces/{trace_id}:
    get:
      tags: [traces]
      parameters:
        - name: trace_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceDetail'

components:
  schemas:
    # ---------- enums ----------
    SkillKind:
      type: string
      enum: [python, instruction, composite]
    ProvenanceKind:
      type: string
      enum: [hand-authored, cluster-derived, nl-gen, retention-violation, rejected-feedback]
    IterationState:
      type: string
      enum: [running, gate-pass, gate-blocked-regression, gate-blocked-no-improvement, sandbox-error]
    ProposalState:
      type: string
      enum: [pending, in-gate, gate-failed, gate-passed, rejected, approved-awaiting-deploy, deployed, rolled-back]
    WorkflowMode:
      type: string
      enum: [gated, autonomous]
    ApproverType:
      type: string
      enum: [human, llm-judge, autonomous]
    SandboxErrorClass:
      type: string
      enum: [Timeout, OOM, Crash]
    AuditKind:
      type: string
      enum:
        - skill-version-created
        - gate-run-started
        - gate-run-completed
        - proposal-created
        - proposal-approved
        - proposal-rejected
        - proposal-deployed
        - proposal-rolled-back
        - eval-case-added
        - cluster-created
        - cluster-relabeled
        - workflow-created
        - meta-eval-result
        - schema-migration
        - deployment-created
        - deployment-updated

    # ---------- core entities ----------
    Workflow:
      type: object
      required: [id, description, spec, created_at]
      properties:
        id: { type: string }
        description: { type: string }
        spec:
          type: object
          description: Frozen-schema NL-gen output (W3 freeze). See packages/trace-format/ for shape.
        metric_id: { type: string }
        sim_skill_id: { type: string }
        meta_eval_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
        mode: { $ref: '#/components/schemas/WorkflowMode' }
        created_at: { type: string, format: date-time }

    CreateWorkflowRequest:
      type: object
      required: [description]
      properties:
        description: { type: string, minLength: 10 }

    # W7 slice 2 — Health page row + LiftChart point
    WorkflowSummary:
      type: object
      required:
        - id
        - description
        - mode
        - iteration_count
        - pending_proposals_count
      properties:
        id: { type: string }
        description: { type: string }
        mode: { $ref: '#/components/schemas/WorkflowMode' }
        iteration_count: { type: integer }
        best_ever_score: { type: number, format: float, nullable: true }
        last_improved_at: { type: string, format: date-time, nullable: true }
        pending_proposals_count: { type: integer }

    WorkflowListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/WorkflowSummary' }
        total: { type: integer }

    IterationPoint:
      type: object
      required:
        - iteration_index
        - state
        - has_approved_proposal
      properties:
        iteration_index: { type: integer }
        val_score: { type: number, format: float, nullable: true }
        best_ever_score_after: { type: number, format: float, nullable: true }
        state: { $ref: '#/components/schemas/IterationState' }
        has_approved_proposal: { type: boolean }
        ended_at: { type: string, format: date-time, nullable: true }

    IterationListResponse:
      type: object
      required: [workflow_id, items]
      properties:
        workflow_id: { type: string }
        items:
          type: array
          items: { $ref: '#/components/schemas/IterationPoint' }

    # W7 slice 3 — Failure cluster card (centroid omitted)
    FailureClusterSummary:
      type: object
      required:
        - id
        - label
        - severity
        - cluster_size
        - sample_trace_ids
        - created_at
        - latest_proposal_id
      properties:
        id: { type: string, format: uuid }
        workflow_id: { type: string, nullable: true }
        label: { type: string }
        severity:
          type: string
          enum: [high, medium, low]
        cluster_size: { type: integer }
        label_eval_score: { type: number, format: float, nullable: true }
        quality_score: { type: number, format: float, nullable: true }
        sample_trace_ids:
          type: array
          items: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        # W7 slice 7 (7.1.4) — most recent proposal_id whose iteration
        # was triggered by this cluster. Drives the Failures-card
        # click-through; null when no proposal has spawned yet.
        latest_proposal_id:
          type: string
          format: uuid
          nullable: true

    FailureClusterListResponse:
      type: object
      required: [workflow_id, items]
      properties:
        workflow_id: { type: string }
        items:
          type: array
          items: { $ref: '#/components/schemas/FailureClusterSummary' }

    # W7 slice 4 — Audit trail row + verify response
    AuditEntryRow:
      type: object
      required: [id, seq, kind, actor, payload, created_at]
      properties:
        id: { type: string, format: uuid }
        seq: { type: integer }
        kind: { $ref: '#/components/schemas/AuditKind' }
        actor: { type: string }
        related_id: { type: string, format: uuid, nullable: true }
        payload:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }

    AuditListResponse:
      type: object
      required: [items, total, truncated]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AuditEntryRow' }
        total: { type: integer }
        truncated: { type: boolean }

    AuditVerifyResponse:
      type: object
      required:
        - valid
        - total_entries
        - min_seq
        - max_seq
        - missing_seqs
        - duplicate_seqs
        - canonical_export_bytes
        - checked_at
      properties:
        valid: { type: boolean }
        total_entries: { type: integer }
        min_seq: { type: integer, nullable: true }
        max_seq: { type: integer, nullable: true }
        missing_seqs:
          type: array
          items: { type: integer }
          description: Capped at 100 entries by the API.
        duplicate_seqs:
          type: array
          items: { type: integer }
          description: Capped at 100 entries by the API.
        canonical_export_bytes: { type: integer }
        checked_at: { type: string, format: date-time }

    Approval:
      type: object
      required: [id, proposal_id, decided_by, approver_type, decision, decided_at]
      properties:
        id: { type: string, format: uuid }
        proposal_id: { type: string, format: uuid }
        decided_by: { type: string, description: "'human:<id>' | 'llm-judge' | 'autonomous'" }
        approver_type: { $ref: '#/components/schemas/ApproverType' }
        decision: { type: string, enum: [approve, reject] }
        comment: { type: string, nullable: true }
        became_eval_case_id: { type: string, format: uuid, nullable: true, description: "Non-null when decision=reject and comment is non-empty" }
        decided_at: { type: string, format: date-time }

    Proposal:
      type: object
      required: [id, iteration_id, skill_id, state, created_at]
      properties:
        id: { type: string, format: uuid }
        iteration_id: { type: string, format: uuid }
        skill_id: { type: string }
        parent_version_id: { type: string, format: uuid }
        plain_language_summary: { type: string }
        state: { $ref: '#/components/schemas/ProposalState' }
        eval_score: { type: number, format: float, minimum: 0, maximum: 1, nullable: true, description: "LLM-judge score (W2)" }
        eval_rationale: { type: string, nullable: true, description: "LLM-judge plain-language reason (W2)" }
        created_at: { type: string, format: date-time }

    ProposalDetail:
      allOf:
        - $ref: '#/components/schemas/Proposal'
        - type: object
          properties:
            proposed_content: { type: string }
            parent_content: { type: string }
            unified_diff: { type: string }
            expected_impact:
              type: object
              properties:
                improves:
                  type: array
                  items:
                    type: object
                    properties:
                      eval_case_id: { type: string, format: uuid }
                      delta: { type: number }
                regresses:
                  type: array
                  items:
                    type: object
                    properties:
                      eval_case_id: { type: string, format: uuid }
                      delta: { type: number }
            gate_result:
              type: object
              properties:
                passes_prior_suite: { type: integer }
                total_prior_suite: { type: integer }
                val_score: { type: number }
                best_ever_score: { type: number }

    ProposalListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Proposal' }
        next_cursor: { type: string }

    LiftPoint:
      type: object
      required: [iteration_index, score]
      properties:
        iteration_index: { type: integer }
        score: { type: number }
        ts: { type: string, format: date-time }
        state: { $ref: '#/components/schemas/IterationState' }
        annotation: { type: string, description: "If non-null, an approved/rejected proposal that landed at this point." }
        deployment_id: { type: string, format: uuid, nullable: true }
        config_tag: { type: string, nullable: true, description: "SkillDeployment.config_tag; null when no deployment config" }
        model_id: { type: string, nullable: true }

    AuditEntry:
      type: object
      required: [id, seq, kind, payload, actor, created_at]
      properties:
        id: { type: string, format: uuid }
        seq: { type: integer, format: int64 }
        kind: { $ref: '#/components/schemas/AuditKind' }
        payload: { type: object }
        related_id: { type: string, format: uuid }
        actor: { type: string }
        created_at: { type: string, format: date-time }

    AuditPage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AuditEntry' }
        next_cursor: { type: integer }

    Skill:
      type: object
      required: [id, kind, head_version_id]
      properties:
        id: { type: string }
        kind: { $ref: '#/components/schemas/SkillKind' }
        head_version_id: { type: string, format: uuid }
        workflow_id: { type: string }
        capability_tags:
          type: array
          items: { type: string }

    SkillVersion:
      type: object
      required: [id, skill_id, version_seq, content, created_at, created_by]
      properties:
        id: { type: string, format: uuid }
        skill_id: { type: string }
        parent_version_id: { type: string, format: uuid }
        version_seq: { type: integer }
        content: { type: string }
        retention_block:
          type: object
          description: Parsed YAML frontmatter; see SKILL_FORMAT.md
        diff_summary: { type: string }
        created_at: { type: string, format: date-time }
        created_by: { type: string }

    SkillDeployment:
      type: object
      required: [id, skill_id, config_tag, model_id, run_config, traffic_weight, is_active, created_at]
      properties:
        id: { type: string, format: uuid }
        skill_id: { type: string }
        config_tag: { type: string, description: "e.g. 'control' | 'opus-low-temp' | 'sonnet-v2'" }
        model_id: { type: string, description: "e.g. 'claude-opus-4-7'" }
        run_config:
          type: object
          description: "temperature, tools, system_prompt_override, timeout_ms"
        traffic_weight: { type: number, minimum: 0, maximum: 1 }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    FailureCluster:
      type: object
      required: [id, label, severity, cluster_size]
      properties:
        id: { type: string, format: uuid }
        workflow_id: { type: string }
        label: { type: string }
        label_eval_score:
          type: number
          minimum: 0
          maximum: 1
          description: "D4 cluster-label-vs-human agreement score."
        severity:
          type: string
          enum: [high, medium, low]
        cluster_size: { type: integer }
        quality_score: { type: number, description: "HDBSCAN persistence; below threshold → 'more iterations needed' UI." }

    Trace:
      type: object
      required: [id, events, started_at]
      properties:
        id: { type: string, format: uuid }
        workflow_id: { type: string }
        iteration_id: { type: string, format: uuid }
        skill_version_id: { type: string, format: uuid }
        events:
          type: array
          description: Typed AgentEvent (see packages/trace-format/)
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time }
        token_usage: { type: object }

    # W7 slice 8 (7.1.9) — trace inspection DTOs
    TraceSummary:
      type: object
      required:
        - id
        - started_at
        - event_count
        - kind_counts
      properties:
        id: { type: string, format: uuid }
        workflow_id: { type: string, nullable: true }
        iteration_id: { type: string, format: uuid, nullable: true }
        iteration_index: { type: integer, nullable: true }
        skill_version_id: { type: string, format: uuid, nullable: true }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }
        event_count: { type: integer }
        kind_counts:
          type: object
          additionalProperties: { type: integer }

    TraceListResponse:
      type: object
      required: [workflow_id, items]
      properties:
        workflow_id: { type: string }
        items:
          type: array
          items: { $ref: '#/components/schemas/TraceSummary' }

    # W7 slice 11 (7.1.12) — workflow anatomy DTO
    WorkflowAnatomyResponse:
      type: object
      required: [id, description, mode, spec]
      properties:
        id: { type: string }
        description: { type: string }
        mode:
          type: string
          enum: [gated, autonomous]
        spec:
          type: object
          description: |
            Raw NL-gen spec JSONB. Conforms to
            packages/kernel/src/ownevo_kernel/nl_gen/spec.py:WorkflowSpec
            v1.0 — keys: domain, environment, tools, reviewer,
            success_criterion, ui.

    # W7 slices 9 + 10 (7.1.10 + 7.1.11) — skill detail DTOs
    SkillSummaryResponse:
      type: object
      required: [id, kind, capability_tags]
      properties:
        id: { type: string }
        kind:
          type: string
          enum: [python, instruction, composite]
        workflow_id: { type: string, nullable: true }
        capability_tags:
          type: array
          items: { type: string }
        head_version_id: { type: string, format: uuid, nullable: true }
        head_version_seq: { type: integer, nullable: true }
        head_created_at: { type: string, format: date-time, nullable: true }

    SkillListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SkillSummaryResponse' }

    SkillVersionSummary:
      type: object
      required: [id, version_seq, created_by, created_at]
      properties:
        id: { type: string, format: uuid }
        version_seq: { type: integer }
        parent_version_id: { type: string, format: uuid, nullable: true }
        diff_summary: { type: string, nullable: true }
        created_by: { type: string }
        created_at: { type: string, format: date-time }

    SkillRelatedEvalCase:
      type: object
      required: [id, provenance, is_test_fold, created_at]
      properties:
        id: { type: string, format: uuid }
        workflow_id: { type: string, nullable: true }
        provenance: { type: string }
        expected_behavior: { type: object, nullable: true }
        is_test_fold: { type: boolean }
        created_at: { type: string, format: date-time }

    SkillDetailResponse:
      type: object
      required: [id, kind, capability_tags, versions, related_eval_cases]
      properties:
        id: { type: string }
        kind:
          type: string
          enum: [python, instruction, composite]
        workflow_id: { type: string, nullable: true }
        workflow_description: { type: string, nullable: true }
        capability_tags:
          type: array
          items: { type: string }
        head_version_id: { type: string, format: uuid, nullable: true }
        head_version_seq: { type: integer, nullable: true }
        head_content: { type: string, nullable: true }
        head_retention_block: { type: object, nullable: true }
        head_diff_summary: { type: string, nullable: true }
        head_created_at: { type: string, format: date-time, nullable: true }
        head_created_by: { type: string, nullable: true }
        parent_content: { type: string, nullable: true }
        parent_version_seq: { type: integer, nullable: true }
        versions:
          type: array
          items: { $ref: '#/components/schemas/SkillVersionSummary' }
        related_eval_cases:
          type: array
          items: { $ref: '#/components/schemas/SkillRelatedEvalCase' }

    TraceDetail:
      type: object
      required:
        - id
        - started_at
        - events
      properties:
        id: { type: string, format: uuid }
        workflow_id: { type: string, nullable: true }
        iteration_id: { type: string, format: uuid, nullable: true }
        iteration_index: { type: integer, nullable: true }
        skill_version_id: { type: string, format: uuid, nullable: true }
        skill_id: { type: string, nullable: true }
        skill_version_seq: { type: integer, nullable: true }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }
        metric_outputs: { type: object, nullable: true }
        token_usage: { type: object, nullable: true }
        events:
          type: array
          description: |
            Typed AgentEvent stream — discriminated by `type`. See
            packages/trace-format/SPEC.md for the variant set
            (skill_loaded, content_delta, reasoning_delta,
            tool_call_start, tool_call_result, citation,
            monitor_signal).
          items:
            type: object

    # ---------- SSE event types ----------
    SSEEvent:
      oneOf:
        - $ref: '#/components/schemas/GateProgressEvent'
        - $ref: '#/components/schemas/IterationCompletedEvent'
        - $ref: '#/components/schemas/ProposalStateChangedEvent'
        - $ref: '#/components/schemas/AuditAppendedEvent'
        - $ref: '#/components/schemas/LiftUpdatedEvent'
        - $ref: '#/components/schemas/MetaEvalProgressEvent'
        - $ref: '#/components/schemas/SimGeneratedEvent'
      discriminator:
        propertyName: type

    GateProgressEvent:
      type: object
      required: [type, iteration_id, step]
      properties:
        type: { type: string, enum: [gate_progress] }
        iteration_id: { type: string, format: uuid }
        step:
          type: string
          enum: [running-prior-suite, running-val-score, promoting-failures, completed]
        progress: { type: number, minimum: 0, maximum: 1 }
        partial_result: { type: object }

    IterationCompletedEvent:
      type: object
      required: [type, iteration_id, state]
      properties:
        type: { type: string, enum: [iteration_completed] }
        iteration_id: { type: string, format: uuid }
        state: { $ref: '#/components/schemas/IterationState' }
        sandbox_error_class: { $ref: '#/components/schemas/SandboxErrorClass' }
        val_score: { type: number }

    ProposalStateChangedEvent:
      type: object
      required: [type, proposal_id, new_state]
      properties:
        type: { type: string, enum: [proposal_state_changed] }
        proposal_id: { type: string, format: uuid }
        new_state: { $ref: '#/components/schemas/ProposalState' }

    AuditAppendedEvent:
      type: object
      required: [type, seq, kind]
      properties:
        type: { type: string, enum: [audit_appended] }
        seq: { type: integer, format: int64 }
        kind: { $ref: '#/components/schemas/AuditKind' }
        related_id: { type: string, format: uuid }

    LiftUpdatedEvent:
      type: object
      required: [type, workflow_id, point]
      properties:
        type: { type: string, enum: [lift_updated] }
        workflow_id: { type: string }
        point: { $ref: '#/components/schemas/LiftPoint' }

    MetaEvalProgressEvent:
      type: object
      required: [type, workflow_id]
      properties:
        type: { type: string, enum: [meta_eval_progress] }
        workflow_id: { type: string }
        coverage_score: { type: number }
        per_dimension: { type: object }

    SimGeneratedEvent:
      type: object
      required: [type, workflow_id]
      properties:
        type: { type: string, enum: [sim_generated] }
        workflow_id: { type: string }
        sim_skill_id: { type: string }

    # ---------- errors ----------
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

  responses:
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
