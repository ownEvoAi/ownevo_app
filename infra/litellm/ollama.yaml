# LiteLLM proxy config — Anthropic /v1/messages → Ollama /api/chat translation.
#
# Used by `apps/kernel/scripts/run_a4_4_local_smoke.sh` to dogfood the A4.4
# NL-gen smoketest gate against local models without touching the
# Anthropic API. Set `OWNEVO_OLLAMA_HOST` to the host running the Ollama
# daemon (default 192.168.1.50; override for laptop-local Ollama).
#
# Models picked from docs/local-model-testing.md candidate list.
# Provider string is `ollama_chat/<model>` (not `ollama/<model>`) — the
# `_chat` variant routes through Ollama's `/api/chat` endpoint, which
# is the only path that exposes proper tool-call translation in
# LiteLLM 1.83.x. Plain `ollama/<model>` uses `/api/generate` and
# silently drops tool definitions.
#
# `num_ctx: 65536` mitigates F1 (Ollama /v1 truncation when ctx not
# explicitly passed). Required even on a single-turn smoketest because
# the demand-prediction trajectory + tool definitions push past the
# 4k Ollama default.
#
# A4.4 smoke verdict on these models (2026-05-05, --from-fixtures, $0):
#   devstral-small-2 (24B): ALL 3 ✅ — beats Sonnet 4.6 on demand-prediction
#   qwen2.5-coder:32b:      ALL 3 ✅ — passes via degenerate always-True bias on demand-prediction
#   qwen3-coder:30b:        1/3   — strong on classification but weak on the noisy ones
#   gpt-oss:20b:            errs out (max_tokens before tool-call commit)

model_list:
  - model_name: qwen3-coder-30b
    litellm_params:
      model: ollama_chat/qwen3-coder:30b
      api_base: os.environ/OWNEVO_OLLAMA_HOST
      num_ctx: 65536

  - model_name: qwen3-30b-instruct
    litellm_params:
      model: ollama_chat/qwen3:30b-instruct
      api_base: os.environ/OWNEVO_OLLAMA_HOST
      num_ctx: 65536

  - model_name: devstral-small-2
    litellm_params:
      model: ollama_chat/devstral-small-2:latest
      api_base: os.environ/OWNEVO_OLLAMA_HOST
      num_ctx: 65536

  - model_name: qwen2.5-coder-32b
    litellm_params:
      model: ollama_chat/qwen2.5-coder:32b
      api_base: os.environ/OWNEVO_OLLAMA_HOST
      num_ctx: 65536

  - model_name: gpt-oss-20b
    litellm_params:
      model: ollama_chat/gpt-oss:20b
      api_base: os.environ/OWNEVO_OLLAMA_HOST
      num_ctx: 65536

litellm_settings:
  set_verbose: false
  drop_params: true   # silently drop unsupported params instead of erroring
