# Unit + schema-freeze CI — runs on every PR and push to main.
#
# Covers:
#   - apps/kernel: full pytest suite (excl. Docker-gated sandbox tests)
#   - packages/trace-format: full pytest suite
#   - Schema freeze guards catch structural drift before it reaches main
#   - apps/web: production build (catches Lightning CSS parse errors invisible to next dev)
#
# Docker-gated tests (test_sandbox.py, test_nl_gen_sim_sandbox.py,
# test_baselines_m5_lightgbm_sandboxed.py) require the sandbox image and are
# handled by m5-replay-nightly.yml instead.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install 3.13

      - name: Install workspace
        run: uv sync --all-extras

      - name: Run kernel tests (excl. Docker-gated)
        # -m "not docker" skips any test marked with @pytest.mark.docker.
        # The sandbox tests use pytestmark skipif on docker availability,
        # so they self-skip when the daemon is absent — but the explicit
        # marker exclusion keeps the output clean and the intent clear.
        run: |
          uv run pytest apps/kernel/tests/ \
            --ignore=apps/kernel/tests/test_sandbox.py \
            --ignore=apps/kernel/tests/test_nl_gen_sim_sandbox.py \
            --ignore=apps/kernel/tests/test_baselines_m5_lightgbm_sandboxed.py \
            --ignore=apps/kernel/tests/test_agent_tools_run_pipeline.py \
            -v --tb=short

      - name: Run trace-format tests
        run: uv run pytest packages/trace-format/tests/ -v --tb=short

  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: apps/web

      - name: Build web (production)
        run: npm run build
        working-directory: apps/web
