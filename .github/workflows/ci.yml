# Unit + integration + schema-freeze CI — runs on every PR and push to main.
#
# Covers:
#   - apps/kernel: full pytest suite (excl. Docker-gated sandbox tests),
#     including DB-gated tests against a real Postgres service container
#   - packages/trace-format: full pytest suite
#   - Schema freeze guards catch structural drift before it reaches main
#   - apps/web: production build (catches Lightning CSS parse errors invisible to next dev)
#   - test-otel-emitter-conformance: verifies every emit_* method against CONVENTIONS.md
#
# DB-gated tests skip themselves when OWNEVO_DATABASE_URL is unset; the
# `postgres` service below sets it so they actually run — this is what catches
# migration- and query-level regressions that the unit-only run cannot see.
# The image is pgvector/pgvector:pg16 (matching docker-compose) because
# migration 0001 creates the `vector` extension.
#
# Docker-gated tests (test_sandbox.py, test_nl_gen_sim_sandbox.py,
# test_baselines_m5_lightgbm_sandboxed.py, test_substrate_non_m5.py) run agent
# code in the local-Docker sandbox image and are handled by
# m5-replay-nightly.yml instead.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # DB-gated tests run against this Postgres. pgvector image because migration
    # 0001 does `CREATE EXTENSION vector`. POSTGRES_USER is a superuser (the
    # official image creates it so), which the per-test fixtures need to CREATE
    # DATABASE and CREATE the non-superuser roles the RLS isolation tests use.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ownevo
          POSTGRES_PASSWORD: ownevo
          POSTGRES_DB: ownevo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ownevo -d ownevo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install 3.13

      - name: Install workspace
        run: uv sync --all-extras

      - name: Run kernel tests (excl. Docker-gated)
        # OWNEVO_DATABASE_URL points at the postgres service so DB-gated tests
        # run instead of self-skipping. The --ignore'd files run agent code in
        # the local-Docker sandbox image (absent here); they self-skip on image
        # presence, but excluding them explicitly keeps the run deterministic
        # and the output clean — sandbox integration is the nightly's job.
        env:
          OWNEVO_DATABASE_URL: postgresql://ownevo:ownevo@localhost:5432/ownevo
        run: |
          uv run pytest apps/kernel/tests/ \
            --ignore=apps/kernel/tests/test_sandbox.py \
            --ignore=apps/kernel/tests/test_nl_gen_sim_sandbox.py \
            --ignore=apps/kernel/tests/test_baselines_m5_lightgbm_sandboxed.py \
            --ignore=apps/kernel/tests/test_agent_tools_run_pipeline.py \
            --ignore=apps/kernel/tests/test_substrate_non_m5.py \
            -v --tb=short

      - name: Run trace-format tests
        run: uv run pytest packages/trace-format/tests/ -v --tb=short

      - name: Run OTel emitter conformance tests
        # Verifies that every emit_* method sets the attributes required by
        # docs/OTEL_EMITTER_CONVENTIONS.md.  opentelemetry-sdk is already
        # present because the preceding `uv sync --all-extras` step installed
        # the otel-emit extra.
        run: |
          uv run pytest \
            apps/kernel/tests/test_otel_emitter_conformance.py \
            -v --tb=short

  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: apps/web

      - name: Build web (production)
        run: npm run build
        working-directory: apps/web
