[project]
name = "ownevo-kernel"
version = "0.1.0"
description = "ownEvo kernel — Python improvement loop (sandbox, gate, clustering, NL-gen, audit)"
requires-python = ">=3.11"
dependencies = [
    "ownevo-trace-format",
    "pydantic>=2.7,<3",
    "asyncpg>=0.29",
    "pyyaml>=6",
    "numpy>=1.26,<3",
]

[project.optional-dependencies]
test = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
]

[tool.uv.sources]
ownevo-trace-format = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ownevo_kernel"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
