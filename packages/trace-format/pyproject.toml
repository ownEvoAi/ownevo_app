[project]
name = "ownevo-trace-format"
version = "0.1.0"
description = "Typed AgentEvent schema — the contract between any agent and the ownEvo improvement loop. See SPEC.md."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ownevo_format"]
