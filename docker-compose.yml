services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ownevo-postgres
    environment:
      POSTGRES_USER: ownevo
      POSTGRES_PASSWORD: ownevo
      POSTGRES_DB: ownevo
    ports:
      - "${OWNEVO_PG_PORT:-5432}:5432"
    volumes:
      - ownevo-pg-data:/var/lib/postgresql/data
      - ./apps/kernel/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ownevo", "-d", "ownevo"]
      interval: 2s
      timeout: 5s
      retries: 15

  kernel:
    build:
      context: .
      dockerfile: apps/kernel/Dockerfile
    container_name: ownevo-kernel
    environment:
      OWNEVO_DATABASE_URL: postgresql://ownevo:ownevo@postgres:5432/ownevo
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # NL-gen model overrides for local dev. Empty/unset → per-generator
      # DEFAULT_MODEL (claude-opus-4-7). Setting OWNEVO_NL_GEN_MODEL routes
      # all four authoring-trio calls (spec / sim / metric / eval) to the
      # chosen model. ANTHROPIC_BASE_URL points the AsyncAnthropic client
      # at any /v1/messages-compatible endpoint (LM Studio, LiteLLM proxy,
      # vLLM) for self-hosted runs.
      OWNEVO_NL_GEN_MODEL: ${OWNEVO_NL_GEN_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      # Per-surface model overrides (see docs/ENV_VARS.md §5). Unset →
      # the hardcoded `DEFAULT_MODEL` in each module.
      OWNEVO_INSTRUCTION_PROPOSER_MODEL: ${OWNEVO_INSTRUCTION_PROPOSER_MODEL:-}
      OWNEVO_META_EVAL_MODEL: ${OWNEVO_META_EVAL_MODEL:-}
      OWNEVO_AGENT_SOLVER_MODEL: ${OWNEVO_AGENT_SOLVER_MODEL:-}
      OWNEVO_CLUSTER_LABEL_MODEL: ${OWNEVO_CLUSTER_LABEL_MODEL:-}
      OWNEVO_CLUSTER_JUDGE_MODEL: ${OWNEVO_CLUSTER_JUDGE_MODEL:-}
      OWNEVO_APPROVER_MODEL: ${OWNEVO_APPROVER_MODEL:-}
      OWNEVO_LOOP_MODEL: ${OWNEVO_LOOP_MODEL:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    container_name: ownevo-web
    environment:
      OWNEVO_KERNEL_API_URL: http://kernel:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - kernel
    restart: unless-stopped

volumes:
  ownevo-pg-data:
