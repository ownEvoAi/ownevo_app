services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ownevo-postgres
    environment:
      POSTGRES_USER: ownevo
      POSTGRES_PASSWORD: ownevo
      POSTGRES_DB: ownevo
    ports:
      - "${OWNEVO_PG_PORT:-5432}:5432"
    volumes:
      - ownevo-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "ownevo", "-d", "ownevo"]
      interval: 2s
      timeout: 5s
      retries: 15

  # One-shot migration runner. Replaces the old
  # `migrations:/docker-entrypoint-initdb.d` mount, which (a) only ran on a
  # first-boot empty data dir, (b) bypassed the `schema_migrations` ledger so
  # re-runs and partial applies were untracked, and (c) ran each file through
  # psql's implicit transaction, which `CREATE INDEX CONCURRENTLY` (migrations
  # 0018b/0024/0027) refuses. `scripts/migrate.py` is the real runner: it
  # tracks applied files, is idempotent, and runs the `-- ownevo:no-txn`
  # migrations outside a transaction. Runs to completion then exits; the
  # kernel waits on `service_completed_successfully` so it never starts
  # against an unmigrated schema. Shares the kernel image (same build) so the
  # stack builds once.
  migrate:
    build:
      context: .
      dockerfile: apps/kernel/Dockerfile
    image: ownevo-kernel:local
    container_name: ownevo-migrate
    command: ["uv", "run", "--package", "ownevo-kernel", "--extra", "api",
              "python", "apps/kernel/scripts/migrate.py"]
    environment:
      OWNEVO_DATABASE_URL: postgresql://ownevo:ownevo@postgres:5432/ownevo
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  kernel:
    build:
      context: .
      dockerfile: apps/kernel/Dockerfile
    image: ownevo-kernel:local
    container_name: ownevo-kernel
    environment:
      OWNEVO_DATABASE_URL: postgresql://ownevo:ownevo@postgres:5432/ownevo
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Per-surface model overrides (see docs/local-model-testing.md §
      # "How to choose a model per surface" for the decision guide and
      # docs/ENV_VARS.md §5 for the full env-var → surface table).
      # Empty/unset → the hardcoded `DEFAULT_MODEL` in each module
      # (claude-opus-4-7 for spec/sim/metric/eval, sonnet for proposer,
      # haiku for agent_solver). Override via the .env file at the repo
      # root — see .env.example / .env.local-lms.example / .env.hybrid.example.
      # `ANTHROPIC_BASE_URL` routes every `AsyncAnthropic` call to a
      # self-hosted endpoint (LMS Anthropic-compat, LiteLLM proxy, vLLM)
      # when set; cloud Anthropic when empty.
      OWNEVO_NL_GEN_MODEL: ${OWNEVO_NL_GEN_MODEL:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      # Other per-surface model overrides.
      OWNEVO_INSTRUCTION_PROPOSER_MODEL: ${OWNEVO_INSTRUCTION_PROPOSER_MODEL:-}
      OWNEVO_META_EVAL_MODEL: ${OWNEVO_META_EVAL_MODEL:-}
      OWNEVO_AGENT_SOLVER_MODEL: ${OWNEVO_AGENT_SOLVER_MODEL:-}
      OWNEVO_CLUSTER_LABEL_MODEL: ${OWNEVO_CLUSTER_LABEL_MODEL:-}
      OWNEVO_CLUSTER_JUDGE_MODEL: ${OWNEVO_CLUSTER_JUDGE_MODEL:-}
      OWNEVO_APPROVER_MODEL: ${OWNEVO_APPROVER_MODEL:-}
      OWNEVO_LOOP_MODEL: ${OWNEVO_LOOP_MODEL:-}
      # Per-workflow agent-model picker — provider allowlist. Each pair
      # gates one provider; the picker UI shows the union of enabled
      # providers' models. See .env.example § "Per-workflow agent-model
      # picker" for the full layout.
      OWNEVO_PROVIDER_ANTHROPIC_ENABLED: ${OWNEVO_PROVIDER_ANTHROPIC_ENABLED:-true}
      OWNEVO_PROVIDER_ANTHROPIC_MODELS: ${OWNEVO_PROVIDER_ANTHROPIC_MODELS:-claude-opus-4-7,claude-sonnet-4-6,claude-haiku-4-5}
      OWNEVO_PROVIDER_OPENAI_ENABLED: ${OWNEVO_PROVIDER_OPENAI_ENABLED:-false}
      OWNEVO_PROVIDER_OPENAI_MODELS: ${OWNEVO_PROVIDER_OPENAI_MODELS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OWNEVO_PROVIDER_XAI_ENABLED: ${OWNEVO_PROVIDER_XAI_ENABLED:-false}
      OWNEVO_PROVIDER_XAI_MODELS: ${OWNEVO_PROVIDER_XAI_MODELS:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      OWNEVO_PROVIDER_GEMINI_ENABLED: ${OWNEVO_PROVIDER_GEMINI_ENABLED:-false}
      OWNEVO_PROVIDER_GEMINI_MODELS: ${OWNEVO_PROVIDER_GEMINI_MODELS:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OWNEVO_PROVIDER_OPENROUTER_ENABLED: ${OWNEVO_PROVIDER_OPENROUTER_ENABLED:-false}
      OWNEVO_PROVIDER_OPENROUTER_MODELS: ${OWNEVO_PROVIDER_OPENROUTER_MODELS:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OWNEVO_PROVIDER_LOCAL_ENABLED: ${OWNEVO_PROVIDER_LOCAL_ENABLED:-false}
      OWNEVO_PROVIDER_LOCAL_MODELS: ${OWNEVO_PROVIDER_LOCAL_MODELS:-}
      OWNEVO_LOCAL_BASE_URL: ${OWNEVO_LOCAL_BASE_URL:-}
      OWNEVO_LOCAL_API_KEY: ${OWNEVO_LOCAL_API_KEY:-}
      OWNEVO_PROVIDER_OLLAMA_ENABLED: ${OWNEVO_PROVIDER_OLLAMA_ENABLED:-false}
      OWNEVO_PROVIDER_OLLAMA_MODELS: ${OWNEVO_PROVIDER_OLLAMA_MODELS:-}
      OWNEVO_LLM_HOST: ${OWNEVO_LLM_HOST:-}
      OWNEVO_CREDENTIALS_MASTER_KEY: ${OWNEVO_CREDENTIALS_MASTER_KEY:-}
      OWNEVO_DEMO_SIGNING_KEY: ${OWNEVO_DEMO_SIGNING_KEY:-}
      OWNEVO_INTERNAL_AUTH_KEY: ${OWNEVO_INTERNAL_AUTH_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    container_name: ownevo-web
    environment:
      OWNEVO_KERNEL_API_URL: http://kernel:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - kernel
    restart: unless-stopped

volumes:
  ownevo-pg-data:
